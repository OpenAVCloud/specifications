name: Build PDFs

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '!README.md'
      - '.github/workflows/build-pdfs.yml'
  pull_request:
    paths:
      - '**/*.md'
      - '!README.md'
      - '.github/workflows/build-pdfs.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-latex-recommended \
            texlive-latex-extra

      - name: Convert Markdown to PDF
        run: |
          set -e
          converted=0
          failed=0
          while IFS= read -r -d '' md_file; do
            rel="${md_file#./}"
            if [ "$rel" = "README.md" ]; then
              continue
            fi
            pdf_file="${md_file%.md}.pdf"
            echo "Converting: $md_file -> $pdf_file"
            if pandoc "$md_file" -o "$pdf_file" --pdf-engine=xelatex; then
              converted=$((converted + 1))
            else
              echo "::error file=$md_file::pandoc conversion failed"
              failed=$((failed + 1))
            fi
          done < <(find . -type d \( -name orig -o -name .git -o -name node_modules \) -prune -o -type f -name '*.md' -print0)
          echo "Converted: $converted, Failed: $failed"
          if [ "$failed" -gt 0 ]; then
            exit 1
          fi

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: pdfs
          path: '**/*.pdf'
          if-no-files-found: error
